<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css_3.css">
  <title>Inventario Interactivo</title>
  <!--tipografia-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
</head>

<body>
  <h1>Sistema de Inventario</h1>

  <section class="card">
    <h3>PRODUCTOS</h3>
      <section class="form-grid">
    
    <label for="nombre">Nombre:</label>
    <select id="nombre">
        <option value="none">none</option>
        <option value="black_templars">figura black templars</option>
        <option value="blood_angel">figura blood angel</option>
        <option value="brazen_claws">figura brazen claws</option>
        <option value="carcharodons">figura carcharodons</option>
        <option value="dark_angels">figura dark angels</option>
        <option value="exorcists">figura exorcists</option>
        <option value="imperial_fists">figura imperial fists</option>
        <option value="imperial_warmergs">figura imperial warmergs</option>
        <option value="iron_hands">figura iron hands</option>
        <option value="mants_warriors">figura mants warriors</option>
        <option value="minotaurs">figura minotaurs</option>
        <option value="raptors">figura raptors</option>
        <option value="salamanders">figura salamanders</option>
        <option value="senthes_of_the_emperador">figura senthes of the emperador</option>
        <option value="silver_skulls">figura silver skulls</option>
        <option value="silver_templars">figura silver templars</option>
        <option value="space_wolfs">figura space wolfs</option>
        <option value="ultramarines">figura ultramarines</option>
        <option value="void_tridents">figura void tridents</option>
        <option value="white_sears">figura white sears</option>
    </select>

    <div class="producto-preview">
        <img id="previewProducto" src="none.png" alt="Producto">
        <button id="btnAgregar" class="btn-form">Agregar</button>
    </div>

    <label for="cantidad">Cantidad:</label>
    <input type="number" id="cantidad" />

    <label for="precio">Precio unitario:</label>
    <input type="number" id="precio" />

</section>
  </section>

  <section class="card">
    <h3>Inventario</h3>

    <table id="tabla">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Precio</th>
          <th>Total</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <section class="total" id="totalGeneral">Total general: $0</section>
  </section>

  <script src="js_3.js" defer></script>
</body>

</html>
