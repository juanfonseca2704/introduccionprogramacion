<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bootstrap</title>
    <!--Links estilos-->
        <!--iconos-->
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        
</head>
<body>
    <div class="bg-dark text-white p-5 text-center">

    <p class="lead">diseñando si un archivo css</p>
    <button class="btn btn-primary btn-lg mt-3">boton pro</button>
    <button class="btn btn-outline-success btn-lg mt-3">boton fantasma</button>
    </div>

    <div class="container mt-5">
        <div class="row">
            <div class="col-6 text-center bg-primary text-white p-3 border"> yo ocupo 6 columnas</div><!--La etiqueta col va desde 1 a 12-->

            <div class="col-2 text-center bg-danger text-white p-3 border">yo ocupo 2 columnas</div>
        </div>
    </div>

    <div class="row mt-4 text-center">
        <div class="col-12 col-md-4 mb-3">
            <div class="card p-3 shadow">CAJA 1: se apila en movil</div>
        </div>
        <div class="col-12 col-md-4 mb-3">
            <div class="card p-3 shadow">CAJA 2: se apila en movil</div>
        </div>
        <div class="col-12 col-md-4 mb-3">
            <div class="card p-3 shadow">CAJA 3: se apila en movil</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
